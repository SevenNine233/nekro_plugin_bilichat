<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilichat 管理面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 24px; color: #38bdf8; }
h2 { font-size: 18px; margin: 24px 0 12px; color: #94a3b8; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
table { width: 100%; border-collapse: collapse; }
th,td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #334155; }
th { color: #94a3b8; font-weight: 500; font-size: 13px; text-transform: uppercase; }
td { font-size: 14px; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
.btn-outline:hover { background: #334155; }
.input { padding: 8px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 14px; }
.input:focus { outline: none; border-color: #3b82f6; }
.form-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.form-row .input { flex: 1; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.badge-push { background: #166534; color: #4ade80; }
.badge-at { background: #991b1b; color: #fca5a5; }
.badge-ignore { background: #1e293b; color: #64748b; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-live { background: #ef4444; animation: pulse 1.5s infinite; }
.status-off { background: #64748b; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #334155; }
.tab { padding: 10px 20px; cursor: pointer; border: none; background: none; color: #94a3b8; font-size: 14px; border-bottom: 2px solid transparent; }
.tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }
.hidden { display: none; }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; animation: slidein .3s; }
.toast-success { background: #166534; color: #4ade80; }
.toast-error { background: #991b1b; color: #fca5a5; }
@keyframes slidein { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>
<div class="container">
<h1>📺 Bilichat 管理面板</h1>
<div class="tabs">
<button class="tab active" onclick="switchTab(event, 'subscriptions')">订阅管理</button>
<button class="tab" onclick="switchTab(event, 'config')">推送配置</button>
<button class="tab" onclick="switchTab(event, 'status')">运行状态</button>
</div>
<div id="tab-subscriptions">
<div class="card">
<h2>添加订阅</h2>
<div class="form-row">
<input class="input" id="add-chat-key" placeholder="Chat Key (如 onebot_v11-group_123)">
<input class="input" id="add-uid" placeholder="UP UID" type="number">
<input class="input" id="add-uname" placeholder="UP 名称">
<button class="btn btn-primary" onclick="addSub()">添加</button>
</div>
</div>
<div class="card" id="subs-list-card">
<h2>订阅列表</h2>
<div id="subs-list">加载中...</div>
</div>
</div>
<div id="tab-config" class="hidden">
<div class="card">
<h2>推送配置</h2>
<div class="form-row">
<label style="width:140px">API 地址</label>
<input class="input" id="cfg-api-url" value="http://192.168.1.102:40432">
</div>
<div class="form-row">
<label style="width:140px">API Token</label>
<input class="input" id="cfg-api-token" type="password" value="xY8rL2pQ9sN4wT7zK">
</div>
<div class="form-row">
<label style="width:140px">直播检查间隔(s)</label>
<input class="input" id="cfg-live-interval" type="number" value="60">
</div>
<div class="form-row">
<label style="width:140px">动态检查间隔(s)</label>
<input class="input" id="cfg-dyn-interval" type="number" value="300">
</div>
<div class="form-row">
<label style="width:140px">截图质量(10-100)</label>
<input class="input" id="cfg-quality" type="number" value="75" min="10" max="100">
</div>
<div class="form-row">
<label style="width:140px">富文本推送</label>
<input type="checkbox" id="cfg-rich-media" checked onchange="saveConfig()">
</div>
<button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
</div>
</div>
<div id="tab-status" class="hidden">
<div class="card">
<h2>运行状态</h2>
<div id="status-content">加载中...</div>
</div>
</div>
</div>
<script>
const BASE = window.location.pathname.replace(/\/+$/, '');
async function api(path, opts) {
const r = await fetch(BASE + path, {...opts, headers:{'Content-Type':'application/json',...(opts?.headers||{})}});
if (!r.ok) throw new Error(await r.text());
return r.json();
}
function toast(msg, type) {
const t = document.createElement('div');
t.className = 'toast toast-' + type;
t.textContent = msg;
document.body.appendChild(t);
setTimeout(() => t.remove(), 3000);
}
function switchTab(e, name) {
document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
document.querySelectorAll('[id^="tab-"]').forEach(d => d.classList.add('hidden'));
e.target.classList.add('active');
document.getElementById('tab-' + name).classList.remove('hidden');
if (name === 'subscriptions') loadSubs();
if (name === 'status') loadStatus();
}
async function loadSubs() {
try {
const data = await api('/api/subscriptions');
let html = '';
for (const [chat, ups] of Object.entries(data)) {
html += '<h3 style="margin-top:12px;color:#38bdf8">' + chat + '</h3>';
for (const up of ups) {
html += '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1e293b">';
html += '<strong>' + (up.nickname || up.uname) + '</strong>(' + up.uid + ')';
html += '<span class="badge badge-' + (up.live === 'AT_ALL' ? 'at' : up.live === 'IGNORE' ? 'ignore' : 'push') + '">直播:' + up.live + '</span>';
html += '<button class="btn btn-danger" style="margin-left:auto;padding:4px 10px;font-size:12px" onclick="removeSub(\'' + chat + '\',' + up.uid + ')">删除</button>';
html += '</div>';
}
}
document.getElementById('subs-list').innerHTML = html || '<p style="color:#64748b">暂无订阅</p>';
} catch(e) { document.getElementById('subs-list').innerHTML = '<p style="color:#ef4444">加载失败: ' + e.message + '</p>'; }
}
async function addSub() {
const chat = document.getElementById('add-chat-key').value.trim();
const uid = parseInt(document.getElementById('add-uid').value);
const uname = document.getElementById('add-uname').value.trim();
if (!chat || !uid || !uname) { toast('请填写完整信息', 'error'); return; }
try {
await api('/api/subscriptions/add', {method:'POST', body:JSON.stringify({chat_key:chat, uid, uname})});
toast('添加成功', 'success');
loadSubs();
} catch(e) { toast('添加失败: ' + e.message, 'error'); }
}
async function removeSub(chat, uid) {
if (!confirm('确认删除该订阅？')) return;
try {
await api('/api/subscriptions/remove', {method:'POST', body:JSON.stringify({chat_key:chat, uid})});
toast('删除成功', 'success');
loadSubs();
} catch(e) { toast('删除失败: ' + e.message, 'error'); }
}
async function saveConfig() {
try {
const data = {
api_url: document.getElementById('cfg-api-url').value,
api_token: document.getElementById('cfg-api-token').value,
live_interval: parseInt(document.getElementById('cfg-live-interval').value),
dynamic_interval: parseInt(document.getElementById('cfg-dyn-interval').value),
browser_shot_quality: parseInt(document.getElementById('cfg-quality').value),
use_rich_media: document.getElementById('cfg-rich-media').checked
};
await api('/api/config', {method:'POST', body:JSON.stringify(data)});
toast('配置已保存', 'success');
} catch(e) { toast('保存失败: ' + e.message, 'error'); }
}
async function loadStatus() {
try {
const data = await api('/api/status');
let html = '<p>已订阅 UP: <strong>' + data.total_ups + '</strong> 个</p>';
html += '<p>订阅频道: <strong>' + data.total_chats + '</strong> 个</p>';
html += '<table><tr><th>UID</th><th>名称</th><th>直播状态</th><th>最新动态ID</th></tr>';
for (const [uid, s] of Object.entries(data.statuses)) {
const liveIcon = s.live_status === 1 ? '<span class="status-dot status-live"></span>直播中' : '<span class="status-dot status-off"></span>未开播';
html += '<tr><td>' + uid + '</td><td>' + s.name + '</td><td>' + liveIcon + '</td><td>' + s.dyn_offset + '</td></tr>';
}
html += '</table>';
document.getElementById('status-content').innerHTML = html;
} catch(e) { document.getElementById('status-content').innerHTML = '<p style="color:#ef4444">加载失败</p>'; }
}
loadSubs();
</script>
</body>
</html>
